services:
	- type: web
		name: ai-interview-coach-api
		runtime: python
		rootDir: backend
		plan: free
		buildCommand: pip install -r requirements.txt
		startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
		healthCheckPath: /health
		envVars:
			- key: APP_ENV
				value: production
			- key: DATABASE_URL
				sync: false
			- key: FRONTEND_URL
				sync: false
			- key: JWT_SECRET_KEY
				sync: false
			- key: JWT_EXPIRE_MINUTES
				value: "1440"
			- key: GEMINI_API_KEY
				sync: false
			- key: GEMINI_MODEL
				value: gemini-2.5-flash-lite
			- key: QUESTION_BATCH_SIZE
				value: "5"
