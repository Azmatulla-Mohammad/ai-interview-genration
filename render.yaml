services:
  - type: web
    name: ai-interview-coach-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://ai-interview-coach-web.onrender.com
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: QUESTION_BATCH_SIZE
        value: "5"

  - type: web
    name: ai-interview-coach-web
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.15.1
      - key: VITE_API_BASE_URL
        sync: false
